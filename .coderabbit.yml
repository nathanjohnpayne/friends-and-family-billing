# .coderabbit.yml — CodeRabbit configuration
# See https://docs.coderabbit.ai/configuration

language: en-US

tone_instructions: >-
  Focus on bugs, security issues, and correctness over style nitpicks.
  Flag any hardcoded credentials, exposed API keys, or Firebase security
  rule gaps. Keep comments actionable and concise.

reviews:
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main

  profile: assertive
  request_changes_workflow: false

  high_level_summary: true
  high_level_summary_placeholder: "@coderabbitai summary"
  high_level_summary_in_walkthrough: true
  collapse_walkthrough: true
  poem: false

  related_issues: true
  related_prs: true
  assess_linked_issues: true
  estimate_code_review_effort: true

  path_instructions:
    - path: "functions/**"
      instructions: >-
        Firebase Cloud Functions handling billing calculations and
        settlement logic. Verify arithmetic correctness — rounding
        errors in currency math are critical bugs. Ensure amounts
        balance (sum of shares equals total).
    - path: "src/lib/**"
      instructions: >-
        Core library code. Flag any changes to billing calculation
        logic or Firestore data models that could cause data
        inconsistency with existing records.
    - path: "src/app/views/**"
      instructions: >-
        User-facing billing views. Verify currency formatting,
        that totals display correctly, and that edit/delete flows
        have proper confirmation guards.
    - path: "e2e/**"
      instructions: >-
        Playwright E2E tests for billing flows. Ensure new billing
        features have corresponding test coverage.

chat:
  auto_reply: true

knowledge_base:
  learnings:
    scope: auto
