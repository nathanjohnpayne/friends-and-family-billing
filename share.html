<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Annual Billing Summary</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 { font-size: 2rem; margin-bottom: 6px; }
        header .subtitle { font-size: 1rem; opacity: 0.9; }

        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        h2 {
            color: #333;
            margin-bottom: 16px;
            font-size: 1.3rem;
        }

        .summary-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 12px;
        }

        .summary-table th, .summary-table td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        .summary-table th {
            background: #f7fafc;
            font-weight: 600;
            color: #333;
            font-size: 0.9rem;
        }

        .summary-table tr:hover { background: #f9fafb; }

        .total-row {
            font-weight: 600;
            color: #667eea;
            font-size: 1.05rem;
        }

        .child-section { margin-top: 20px; }
        .child-section h3 {
            font-size: 1.1rem;
            color: #555;
            margin-bottom: 10px;
        }

        .payment-summary-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 8px;
        }

        .payment-stat {
            background: #f7fafc;
            border-radius: 8px;
            padding: 16px;
            text-align: center;
        }

        .payment-stat .label {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 4px;
        }

        .payment-stat .value {
            font-size: 1.4rem;
            font-weight: 700;
            color: #333;
        }

        .payment-stat .value.owed { color: #f56565; }
        .payment-stat .value.paid { color: #48bb78; }

        .payment-links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
        }

        .payment-link-card {
            display: block;
            background: #667eea;
            color: white;
            text-decoration: none;
            padding: 16px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            font-size: 1rem;
            transition: background 0.2s, transform 0.2s;
        }

        .payment-link-card:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .payment-method-card {
            background: #f7fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 18px;
        }

        .payment-method-card .pm-label {
            font-weight: 700;
            font-size: 1.05rem;
            color: #333;
            margin-bottom: 6px;
        }

        .payment-method-card .pm-detail {
            color: #555;
            font-size: 0.95rem;
            margin: 4px 0;
        }

        .payment-method-card .pm-detail strong {
            color: #333;
        }

        .payment-method-card a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .payment-method-card a:hover {
            text-decoration: underline;
        }

        .payment-method-card .pm-instructions {
            color: #888;
            font-size: 0.85rem;
            font-style: italic;
            margin-top: 6px;
        }

        .pm-copy-btn {
            background: none;
            border: 1px solid #cbd5e0;
            border-radius: 4px;
            padding: 2px 8px;
            font-size: 0.8rem;
            color: #667eea;
            cursor: pointer;
            margin-left: 6px;
            vertical-align: middle;
        }

        .pm-copy-btn:hover {
            background: #edf2f7;
        }

        .loading-state, .error-state {
            text-align: center;
            padding: 60px 20px;
        }

        .loading-state .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        .loading-state p { color: white; font-size: 1.1rem; }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error-state .error-icon {
            font-size: 3rem;
            margin-bottom: 12px;
        }

        .error-state h2 { color: #333; margin-bottom: 8px; }
        .error-state p { color: #666; }

        #content { display: none; }

        .powered-by {
            text-align: center;
            color: rgba(255,255,255,0.6);
            font-size: 0.8rem;
            margin-top: 24px;
        }

        .review-btn {
            background: none;
            border: 1px solid #e2e8f0;
            color: #667eea;
            font-size: 0.75rem;
            padding: 3px 8px;
            border-radius: 4px;
            cursor: pointer;
            white-space: nowrap;
            font-family: inherit;
            transition: background 0.15s, border-color 0.15s;
        }
        .review-btn:hover {
            background: #f0f0ff;
            border-color: #667eea;
        }

        .dispute-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .dispute-overlay.visible { display: flex; }

        .dispute-dialog {
            background: white;
            border-radius: 12px;
            width: 90%;
            max-width: 480px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .dispute-dialog-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid #e0e0e0;
        }
        .dispute-dialog-header h3 { color: #333; font-size: 1.1rem; margin: 0; }
        .dispute-dialog-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #999;
            line-height: 1;
        }

        .dispute-dialog-body { padding: 20px; }

        .dispute-dialog-body label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
            font-size: 0.9rem;
        }
        .dispute-dialog-body textarea,
        .dispute-dialog-body input[type="text"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.95rem;
            resize: vertical;
            box-sizing: border-box;
        }
        .dispute-dialog-body textarea:focus,
        .dispute-dialog-body input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.15);
        }
        .dispute-field { margin-bottom: 16px; }
        .dispute-field .hint { color: #888; font-size: 0.8rem; margin-top: 4px; }

        .dispute-dialog-footer {
            padding: 12px 20px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }
        .dispute-dialog-footer button {
            padding: 9px 18px;
            border-radius: 6px;
            border: none;
            font-size: 0.95rem;
            font-family: inherit;
            cursor: pointer;
        }
        .dispute-btn-cancel {
            background: #e2e8f0;
            color: #555;
        }
        .dispute-btn-submit {
            background: #667eea;
            color: white;
        }
        .dispute-btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .dispute-success {
            text-align: center;
            padding: 30px 20px;
            color: #48bb78;
        }
        .dispute-success .check-icon { font-size: 2.5rem; margin-bottom: 8px; }

        @media print {
            body { background: white; padding: 0; }
            .card { box-shadow: none; border: 1px solid #ddd; }
            header { color: #333; }
            .payment-link-card { background: #eee; color: #333; }
            .no-print { display: none; }
        }

        .share-dispute-item {
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 14px 16px;
            border-left: 4px solid #e2e8f0;
            margin-bottom: 10px;
        }
        .share-dispute-item.sd-open { border-left-color: #ecc94b; }
        .share-dispute-item.sd-in-review { border-left-color: #667eea; }
        .share-dispute-item.sd-resolved { border-left-color: #48bb78; }
        .share-dispute-item.sd-rejected { border-left-color: #f56565; }

        .sd-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .sd-header strong { font-size: 1rem; color: #333; }
        .sd-badge {
            font-size: 0.75rem;
            font-weight: 600;
            padding: 2px 10px;
            border-radius: 12px;
            text-transform: uppercase;
        }
        .sd-badge.sd-open { background: #fefcbf; color: #975a16; }
        .sd-badge.sd-in-review { background: #ebf4ff; color: #3c5a99; }
        .sd-badge.sd-resolved { background: #f0fff4; color: #276749; }
        .sd-badge.sd-rejected { background: #fff5f5; color: #c53030; }

        .sd-meta { font-size: 0.85rem; color: #888; margin-bottom: 8px; }
        .sd-message { font-size: 0.95rem; color: #444; line-height: 1.5; margin-bottom: 6px; }
        .sd-correction {
            font-size: 0.9rem;
            color: #667eea;
            background: rgba(102,126,234,0.06);
            padding: 6px 10px;
            border-radius: 4px;
            margin-bottom: 8px;
        }
        .sd-resolution {
            font-size: 0.9rem;
            color: #276749;
            background: rgba(72,187,120,0.08);
            padding: 6px 10px;
            border-radius: 4px;
            margin-bottom: 8px;
        }
        .sd-evidence-list {
            margin-top: 8px;
        }
        .sd-evidence-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            background: #f7fafc;
            border-radius: 4px;
            margin-bottom: 4px;
            font-size: 0.9rem;
        }
        .sd-evidence-item a {
            color: #667eea;
            text-decoration: none;
        }
        .sd-evidence-item a:hover { text-decoration: underline; }

        .sd-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        .sd-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            font-family: inherit;
            cursor: pointer;
            font-weight: 500;
        }
        .sd-btn-approve { background: #48bb78; color: white; }
        .sd-btn-approve:hover { background: #38a169; }
        .sd-btn-reject { background: #f56565; color: white; }
        .sd-btn-reject:hover { background: #e53e3e; }
        .sd-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .sd-user-decision {
            font-size: 0.85rem;
            padding: 8px 12px;
            border-radius: 6px;
            margin-top: 8px;
        }
        .sd-user-decision.approved { background: #d1fae5; color: #065f46; }
        .sd-user-decision.rejected { background: #fee2e2; color: #991b1b; }

        .settlement-callout {
            border-radius: 12px;
            padding: 20px 25px;
            margin-bottom: 20px;
            background: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-left: 5px solid #e0e0e0;
        }

        .settlement-callout.outstanding {
            border-left-color: #f56565;
        }

        .settlement-callout.settled {
            border-left-color: #48bb78;
        }

        .settlement-callout-title {
            font-size: 1.05rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
        }

        .settlement-callout-amount {
            font-size: 1.3rem;
            font-weight: 700;
            margin-top: 4px;
        }

        .settlement-callout-amount.owed { color: #f56565; }
        .settlement-callout-amount.clear { color: #48bb78; }

        .settlement-callout-desc {
            font-size: 0.9rem;
            color: #666;
            margin-top: 4px;
        }

        .share-settlement-progress {
            position: relative;
            height: 10px;
            background: #e2e8f0;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 12px;
        }

        .share-settlement-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #48bb78);
            border-radius: 5px;
            transition: width 0.4s ease;
        }

        .share-settlement-progress-label {
            font-size: 0.8rem;
            color: #666;
            margin-top: 4px;
            text-align: right;
        }

        @media (max-width: 600px) {
            .payment-summary-grid { grid-template-columns: 1fr; }
            .payment-links-grid { grid-template-columns: 1fr; }
            header h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="loading" class="loading-state">
            <div class="spinner"></div>
            <p>Loading your annual billing summary&hellip;</p>
        </div>

        <div id="error" class="error-state card" style="display:none;"></div>

        <div id="content">
            <header>
                <h1 id="headerTitle">Annual Billing Summary</h1>
                <p class="subtitle" id="headerSubtitle"></p>
            </header>

            <div id="settlementCallout" style="display:none;"></div>

            <div class="card">
                <h2 id="billBreakdownTitle">Bill Breakdown</h2>
                <table class="summary-table">
                    <thead>
                        <tr>
                            <th>Bill</th>
                            <th>Monthly Amount</th>
                            <th>Split</th>
                            <th>Your Share</th>
                            <th>Annual</th>
                        </tr>
                    </thead>
                    <tbody id="billsTableBody"></tbody>
                </table>
                <div id="linkedSections"></div>
            </div>

            <div class="card">
                <h2>Annual Payment Summary</h2>
                <div class="payment-summary-grid" id="paymentSummaryGrid"></div>
            </div>

            <div id="paymentLinksCard" class="card" style="display:none;">
                <h2>Submit Payment</h2>
                <p style="color:#666; font-size:0.9rem; margin-bottom:12px;">Please review your balance and submit payment using the methods below.</p>
                <div class="payment-links-grid" id="paymentLinksGrid"></div>
            </div>

            <div id="disputesCard" class="card" style="display:none;">
                <h2>Review Requests</h2>
                <div id="shareDisputesList"></div>
            </div>

            <div class="no-print" style="text-align:center; margin-top: 16px;">
                <button onclick="window.print()" style="padding: 10px 24px; background: rgba(255,255,255,0.2); color: white; border: 2px solid rgba(255,255,255,0.4); border-radius: 8px; font-size: 1rem; cursor: pointer; font-family: inherit;">
                    Print / Save PDF
                </button>
            </div>

            <div class="powered-by">Friends &amp; Family Billing</div>
        </div>
    </div>

    <div class="dispute-overlay" id="disputeOverlay">
        <div class="dispute-dialog" id="disputeDialog"></div>
    </div>

    <script>
        var FUNCTION_BASE = 'https://us-central1-friends-and-family-billing.cloudfunctions.net';
        var _shareToken = null;
        var _canDispute = false;

        function escapeHtml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function copyToClipboard(text) {
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text).then(function() {
                    var btn = event.target;
                    var orig = btn.textContent;
                    btn.textContent = 'Copied!';
                    setTimeout(function() { btn.textContent = orig; }, 1500);
                });
            }
        }

        function showError(message) {
            document.getElementById('loading').style.display = 'none';
            var el = document.getElementById('error');
            el.style.display = 'block';
            el.innerHTML = '<div class="error-icon">&#9888;&#65039;</div>'
                + '<h2>Unable to Load Summary</h2>'
                + '<p>' + escapeHtml(message) + '</p>';
        }

        function renderBillsTable(bills, tbody, showReview) {
            var total = 0;
            var colCount = showReview ? 6 : 5;
            bills.forEach(function(b) {
                total += b.annualShare;
                var tr = document.createElement('tr');
                var html = '<td>' + escapeHtml(b.name) + '</td>'
                    + '<td>$' + b.monthlyAmount.toFixed(2) + '</td>'
                    + '<td>' + b.splitCount + ' members</td>'
                    + '<td>$' + b.monthlyShare.toFixed(2) + '</td>'
                    + '<td>$' + b.annualShare.toFixed(2) + '</td>';
                if (showReview) {
                    html += '<td><button class="review-btn" onclick="openDisputeForm('
                        + b.billId + ', \'' + escapeHtml(b.name).replace(/'/g, "\\'") + '\')">'
                        + 'Request Review</button></td>';
                }
                tr.innerHTML = html;
                tbody.appendChild(tr);
            });

            var totalRow = document.createElement('tr');
            totalRow.className = 'total-row';
            totalRow.innerHTML = '<td colspan="3">TOTAL</td>'
                + '<td>$' + (total / 12).toFixed(2) + '</td>'
                + '<td><strong>$' + total.toFixed(2) + '</strong></td>'
                + (showReview ? '<td></td>' : '');
            tbody.appendChild(totalRow);
        }

        function openDisputeForm(billId, billName) {
            var overlay = document.getElementById('disputeOverlay');
            var dialog = document.getElementById('disputeDialog');
            dialog.innerHTML = '<div class="dispute-dialog-header">'
                + '<h3>Request Review</h3>'
                + '<button class="dispute-dialog-close" onclick="closeDispute()">&times;</button>'
                + '</div>'
                + '<div class="dispute-dialog-body">'
                + '<p style="color:#555;margin-bottom:16px;">Flagging <strong>' + escapeHtml(billName) + '</strong> for review.</p>'
                + '<div class="dispute-field">'
                + '<label for="disputeMessage">What looks wrong?</label>'
                + '<textarea id="disputeMessage" rows="4" placeholder="Describe the issue..."></textarea>'
                + '<div class="hint">Required. Max 2,000 characters.</div>'
                + '</div>'
                + '<div class="dispute-field">'
                + '<label for="disputeCorrection">Suggested correction (optional)</label>'
                + '<input type="text" id="disputeCorrection" placeholder="e.g. Should be $45/mo instead of $60" />'
                + '<div class="hint">Max 500 characters.</div>'
                + '</div>'
                + '</div>'
                + '<div class="dispute-dialog-footer">'
                + '<button class="dispute-btn-cancel" onclick="closeDispute()">Cancel</button>'
                + '<button class="dispute-btn-submit" id="disputeSubmitBtn" onclick="submitDispute(' + billId + ', \'' + escapeHtml(billName).replace(/'/g, "\\'") + '\')">Submit</button>'
                + '</div>';
            overlay.classList.add('visible');
        }

        function closeDispute() {
            document.getElementById('disputeOverlay').classList.remove('visible');
        }

        async function submitDispute(billId, billName) {
            var msgEl = document.getElementById('disputeMessage');
            var corrEl = document.getElementById('disputeCorrection');
            var btn = document.getElementById('disputeSubmitBtn');
            var message = (msgEl.value || '').trim();
            var correction = (corrEl.value || '').trim();

            if (!message) {
                msgEl.style.borderColor = '#f56565';
                msgEl.focus();
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Submitting...';

            try {
                var resp = await fetch(FUNCTION_BASE + '/submitDispute', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token: _shareToken,
                        billId: billId,
                        billName: billName,
                        message: message,
                        proposedCorrection: correction || null
                    })
                });

                var data = await resp.json();

                if (!resp.ok) {
                    alert(data.error || 'Could not submit. Please try again.');
                    btn.disabled = false;
                    btn.textContent = 'Submit';
                    return;
                }

                var dialog = document.getElementById('disputeDialog');
                dialog.innerHTML = '<div class="dispute-dialog-header">'
                    + '<h3>Request Review</h3>'
                    + '<button class="dispute-dialog-close" onclick="closeDispute()">&times;</button>'
                    + '</div>'
                    + '<div class="dispute-success">'
                    + '<div class="check-icon">&#10003;</div>'
                    + '<h3 style="color:#333;margin-bottom:8px;">Review Request Submitted</h3>'
                    + '<p style="color:#666;">The account owner will be notified of your request.</p>'
                    + '</div>'
                    + '<div class="dispute-dialog-footer">'
                    + '<button class="dispute-btn-cancel" onclick="closeDispute()">Close</button>'
                    + '</div>';
            } catch (err) {
                console.error('Dispute submission error:', err);
                alert('Could not connect to the server. Please try again later.');
                btn.disabled = false;
                btn.textContent = 'Submit';
            }
        }

        var STATUS_LABELS = { open: 'Open', in_review: 'In Review', resolved: 'Resolved', rejected: 'Rejected' };

        function renderShareDisputes(disputes) {
            var card = document.getElementById('disputesCard');
            var container = document.getElementById('shareDisputesList');
            if (!disputes || disputes.length === 0) return;

            card.style.display = 'block';
            var html = '';

            disputes.forEach(function(d) {
                var sClass = 'sd-' + (d.status || 'open').replace('_', '-');
                var label = STATUS_LABELS[d.status] || d.status;
                var created = d.createdAt ? new Date(d.createdAt).toLocaleDateString() : '';

                html += '<div class="share-dispute-item ' + sClass + '">';
                html += '<div class="sd-header"><strong>' + escapeHtml(d.billName) + '</strong>';
                html += '<span class="sd-badge ' + sClass + '">' + escapeHtml(label) + '</span></div>';
                if (created) html += '<div class="sd-meta">' + escapeHtml(created) + '</div>';
                html += '<div class="sd-message">' + escapeHtml(d.message) + '</div>';
                if (d.proposedCorrection) html += '<div class="sd-correction">Suggested: ' + escapeHtml(d.proposedCorrection) + '</div>';
                if (d.resolutionNote) html += '<div class="sd-resolution">Resolution: ' + escapeHtml(d.resolutionNote) + '</div>';

                if (d.evidence && d.evidence.length > 0) {
                    html += '<div class="sd-evidence-list">';
                    d.evidence.forEach(function(ev) {
                        var icon = ev.contentType && ev.contentType.startsWith('image/') ? '&#128247;' : '&#128196;';
                        html += '<div class="sd-evidence-item">'
                            + '<span>' + icon + '</span>'
                            + '<a href="#" onclick="fetchEvidenceUrl(\'' + escapeHtml(d.id) + '\', ' + ev.index + '); return false;">' + escapeHtml(ev.name) + '</a>'
                            + '</div>';
                    });
                    html += '</div>';
                }

                var ur = d.userReview;
                if (ur && ur.state === 'requested') {
                    html += '<div class="sd-actions" id="sd-actions-' + escapeHtml(d.id) + '">'
                        + '<button class="sd-btn sd-btn-approve" onclick="submitDecision(\'' + escapeHtml(d.id) + '\', \'approve\')">Approve</button>'
                        + '<button class="sd-btn sd-btn-reject" onclick="promptRejectDecision(\'' + escapeHtml(d.id) + '\')">Reject</button>'
                        + '</div>';
                } else if (ur && ur.state === 'approved_by_user') {
                    html += '<div class="sd-user-decision approved">You approved this resolution.</div>';
                } else if (ur && ur.state === 'rejected_by_user') {
                    html += '<div class="sd-user-decision rejected">You rejected this resolution.' + (ur.rejectionNote ? ' — ' + escapeHtml(ur.rejectionNote) : '') + '</div>';
                }

                html += '</div>';
            });

            container.innerHTML = html;
        }

        async function fetchEvidenceUrl(disputeId, evidenceIndex) {
            try {
                var resp = await fetch(FUNCTION_BASE + '/getEvidenceUrl', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: _shareToken, disputeId: disputeId, evidenceIndex: evidenceIndex })
                });
                var data = await resp.json();
                if (!resp.ok) {
                    alert(data.error || 'Could not load evidence.');
                    return;
                }
                window.open(data.url, '_blank');
            } catch (err) {
                console.error('Evidence URL error:', err);
                alert('Could not load evidence. Please try again.');
            }
        }

        async function submitDecision(disputeId, decision, note) {
            var actionsEl = document.getElementById('sd-actions-' + disputeId);
            if (actionsEl) {
                actionsEl.querySelectorAll('button').forEach(function(b) { b.disabled = true; });
            }

            try {
                var body = { token: _shareToken, disputeId: disputeId, decision: decision };
                if (note) body.note = note;

                var resp = await fetch(FUNCTION_BASE + '/submitDisputeDecision', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                var data = await resp.json();

                if (!resp.ok) {
                    alert(data.error || 'Could not submit decision.');
                    if (actionsEl) actionsEl.querySelectorAll('button').forEach(function(b) { b.disabled = false; });
                    return;
                }

                if (actionsEl) {
                    var cls = decision === 'approve' ? 'approved' : 'rejected';
                    var msg = decision === 'approve' ? 'You approved this resolution.' : 'You rejected this resolution.';
                    actionsEl.outerHTML = '<div class="sd-user-decision ' + cls + '">' + escapeHtml(msg) + '</div>';
                }
            } catch (err) {
                console.error('Decision error:', err);
                alert('Could not connect to the server. Please try again.');
                if (actionsEl) actionsEl.querySelectorAll('button').forEach(function(b) { b.disabled = false; });
            }
        }

        function promptRejectDecision(disputeId) {
            var note = prompt('Please explain why you are rejecting this resolution:');
            if (note === null) return;
            if (!note.trim()) {
                alert('A note is required when rejecting.');
                return;
            }
            submitDecision(disputeId, 'reject', note.trim());
        }

        async function load() {
            var params = new URLSearchParams(window.location.search);
            var token = params.get('token');
            if (!token) {
                showError('No share token provided. Please check your link.');
                return;
            }
            _shareToken = token;

            try {
                var resp = await fetch(FUNCTION_BASE + '/resolveShareToken', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token })
                });

                var data = await resp.json();

                if (!resp.ok) {
                    showError(data.error || 'Something went wrong.');
                    return;
                }

                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';

                var scopes = data.scopes || [];
                _canDispute = scopes.includes('disputes:create');

                document.title = data.memberName + ' — Annual Billing Summary ' + data.year;
                document.getElementById('headerTitle').textContent =
                    data.memberName + "'s Annual Billing Summary";
                document.getElementById('headerSubtitle').textContent =
                    'You are viewing your annual shared billing summary for ' + data.year + '.';

                if (data.summary) {
                    document.getElementById('billBreakdownTitle').textContent =
                        data.memberName + "'s Bills";

                    var thead = document.querySelector('.summary-table thead tr');
                    if (_canDispute && thead) {
                        var th = document.createElement('th');
                        th.textContent = '';
                        thead.appendChild(th);
                    }

                    var tbody = document.getElementById('billsTableBody');
                    var billsWithIds = data.summary.bills.map(function(b, i) {
                        b.billId = b.billId || i;
                        return b;
                    });
                    renderBillsTable(billsWithIds, tbody, _canDispute);

                    if (data.linkedMembers && data.linkedMembers.length > 0) {
                        var linkedEl = document.getElementById('linkedSections');
                        data.linkedMembers.forEach(function(lm) {
                            var section = document.createElement('div');
                            section.className = 'child-section';

                            var heading = document.createElement('h3');
                            heading.textContent = lm.name + "'s Bills";
                            section.appendChild(heading);

                            var table = document.createElement('table');
                            table.className = 'summary-table';
                            var headHtml = '<thead><tr>'
                                + '<th>Bill</th><th>Monthly Amount</th>'
                                + '<th>Split</th><th>Share</th><th>Annual</th>'
                                + (_canDispute ? '<th></th>' : '')
                                + '</tr></thead>';
                            table.innerHTML = headHtml;
                            var tb = document.createElement('tbody');
                            var lmBills = lm.bills.map(function(b, i) {
                                b.billId = b.billId || i;
                                return b;
                            });
                            renderBillsTable(lmBills, tb, _canDispute);
                            table.appendChild(tb);
                            section.appendChild(table);
                            linkedEl.appendChild(section);
                        });
                    }
                }

                if (data.paymentSummary) {
                    var ps = data.paymentSummary;
                    var grid = document.getElementById('paymentSummaryGrid');
                    var balClass = ps.balanceRemaining > 0 ? 'owed' : 'paid';

                    grid.innerHTML = ''
                        + '<div class="payment-stat"><div class="label">Annual Total</div>'
                        + '<div class="value">$' + ps.combinedAnnualTotal.toFixed(2) + '</div></div>'
                        + '<div class="payment-stat"><div class="label">Monthly</div>'
                        + '<div class="value">$' + ps.combinedMonthlyTotal.toFixed(2) + '</div></div>'
                        + '<div class="payment-stat"><div class="label">Paid to Date</div>'
                        + '<div class="value paid">$' + ps.totalPaid.toFixed(2) + '</div></div>'
                        + '<div class="payment-stat"><div class="label">Balance Remaining</div>'
                        + '<div class="value ' + balClass + '">$' + ps.balanceRemaining.toFixed(2) + '</div></div>';

                    var pctPaid = ps.combinedAnnualTotal > 0
                        ? Math.min(100, Math.round((ps.totalPaid / ps.combinedAnnualTotal) * 100))
                        : 0;
                    grid.innerHTML += ''
                        + '<div class="payment-stat" style="grid-column: 1 / -1; padding-bottom:10px;">'
                        + '<div class="label">Your Payment Progress</div>'
                        + '<div class="share-settlement-progress"><div class="share-settlement-progress-bar" style="width:' + pctPaid + '%"></div></div>'
                        + '<div class="share-settlement-progress-label">' + pctPaid + '% paid</div>'
                        + '</div>';

                    var callout = document.getElementById('settlementCallout');
                    if (callout) {
                        if (ps.balanceRemaining > 0) {
                            callout.className = 'settlement-callout outstanding';
                            callout.innerHTML = '<div class="settlement-callout-title">You still have an outstanding balance for ' + escapeHtml(data.year) + '.</div>'
                                + '<div class="settlement-callout-amount owed">Amount Remaining: $' + ps.balanceRemaining.toFixed(2) + '</div>';
                        } else if (ps.totalPaid > 0) {
                            callout.className = 'settlement-callout settled';
                            callout.innerHTML = '<div class="settlement-callout-title">You\'re all settled for ' + escapeHtml(data.year) + '. Thank you!</div>';
                        }
                        if (callout.innerHTML) callout.style.display = 'block';
                    }
                }

                if (data.paymentMethods && data.paymentMethods.length > 0) {
                    var linksCard = document.getElementById('paymentLinksCard');
                    linksCard.style.display = 'block';
                    var linksGrid = document.getElementById('paymentLinksGrid');
                    linksGrid.innerHTML = '';

                    data.paymentMethods.forEach(function(pm) {
                        var card = document.createElement('div');
                        card.className = 'payment-method-card';
                        var html = '<div class="pm-label">' + escapeHtml(pm.label) + '</div>';

                        if (pm.type === 'zelle') {
                            var contacts = [pm.email, pm.phone].filter(Boolean);
                            if (contacts.length > 0) {
                                html += '<p class="pm-detail">Send via Zelle to: <strong>'
                                    + contacts.map(function(c) { return escapeHtml(c) + '<button class="pm-copy-btn" onclick="copyToClipboard(\'' + escapeHtml(c) + '\')">Copy</button>'; }).join(' or ')
                                    + '</strong></p>';
                            }
                        } else if (pm.type === 'apple_cash') {
                            var contacts = [pm.phone, pm.email].filter(Boolean);
                            if (contacts.length > 0) {
                                html += '<p class="pm-detail">Send via Messages or Wallet to: <strong>'
                                    + contacts.map(function(c) { return escapeHtml(c) + '<button class="pm-copy-btn" onclick="copyToClipboard(\'' + escapeHtml(c) + '\')">Copy</button>'; }).join(' or ')
                                    + '</strong></p>';
                            }
                        } else {
                            if (pm.handle) {
                                html += '<p class="pm-detail">' + escapeHtml(pm.handle) + '<button class="pm-copy-btn" onclick="copyToClipboard(\'' + escapeHtml(pm.handle) + '\')">Copy</button></p>';
                            }
                            if (pm.url) {
                                html += '<p class="pm-detail"><a href="' + escapeHtml(pm.url) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(pm.url) + '</a></p>';
                            }
                        }

                        if (pm.instructions) {
                            html += '<p class="pm-instructions">' + escapeHtml(pm.instructions) + '</p>';
                        }

                        card.innerHTML = html;
                        linksGrid.appendChild(card);
                    });
                } else if (data.paymentLinks && data.paymentLinks.length > 0) {
                    var linksCard = document.getElementById('paymentLinksCard');
                    linksCard.style.display = 'block';
                    var linksGrid = document.getElementById('paymentLinksGrid');

                    data.paymentLinks.forEach(function(pl) {
                        var a = document.createElement('a');
                        a.className = 'payment-link-card';
                        a.href = pl.url;
                        a.target = '_blank';
                        a.rel = 'noopener noreferrer';
                        a.textContent = pl.name;
                        linksGrid.appendChild(a);
                    });
                }

                if (data.disputes && data.disputes.length > 0) {
                    renderShareDisputes(data.disputes);
                }

            } catch (err) {
                console.error('Share page error:', err);
                showError('Could not connect to the server. Please try again later.');
            }
        }

        load();
    </script>
</body>
</html>
