<!DOCTYPE html>
<html>
<head>
    <title>Check Firebase Data</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Cdefs%3E%3ClinearGradient id='fg' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%236E78D6'/%3E%3Cstop offset='100%25' stop-color='%237B5FAF'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='48' height='48' rx='12' fill='url(%23fg)'/%3E%3Ccircle cx='24' cy='25' r='10' fill='none' stroke='%23fff' stroke-width='3'/%3E%3Ccircle cx='24' cy='15' r='2.5' fill='%23fff'/%3E%3C/svg%3E">
</head>
<body>
    <h1>Firebase Data Checker</h1>
    <button onclick="checkData()">Check My Data</button>
    <pre id="output"></pre>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script>
        async function checkData() {
            const output = document.getElementById('output');
            
            try {
                const user = auth.currentUser;
                if (!user) {
                    output.textContent = 'Not logged in. Logging in...';
                    await new Promise(resolve => {
                        auth.onAuthStateChanged(u => {
                            if (u) resolve();
                        });
                    });
                }
                
                const uid = auth.currentUser.uid;
                output.textContent = 'Fetching data for user: ' + uid + '\n\n';
                
                const docRef = db.collection('users').doc(uid);
                const doc = await docRef.get();
                
                if (doc.exists) {
                    const data = doc.data();
                    output.textContent += 'DATA FOUND!\n\n';
                    output.textContent += 'Family Members: ' + (data.familyMembers ? data.familyMembers.length : 0) + '\n';
                    output.textContent += 'Bills: ' + (data.bills ? data.bills.length : 0) + '\n\n';
                    output.textContent += JSON.stringify(data, null, 2);
                } else {
                    output.textContent += 'No data found in Firebase for this user.';
                }
            } catch (error) {
                output.textContent = 'Error: ' + error.message + '\n\n' + error.stack;
            }
        }
    </script>
</body>
</html>
